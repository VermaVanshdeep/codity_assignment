# Air hot-reload config for the Worker service
root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/worker ./cmd/worker"
  bin = "./tmp/worker"
  delay = 1000
  exclude_dir = ["tmp", "vendor", "testdata"]
  include_ext = ["go"]
  kill_delay = "5s"
  send_interrupt = true
  stop_on_error = true

[log]
  time = true

[color]
  main = "blue"
  watcher = "cyan"
  build = "yellow"
  runner = "green"
