# golangci-lint configuration
# https://golangci-lint.run/usage/configuration/

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck        # check error returns
    - gosimple        # simplify code
    - govet           # go vet
    - ineffassign     # detect ineffectual assignments
    - staticcheck     # go staticcheck
    - unused          # detect unused code
    - gofmt           # formatting
    - goimports       # import ordering
    - misspell        # spelling
    - godot           # comments end with period
    - revive          # drop-in replacement for golint
    - bodyclose       # http response body close check
    - contextcheck    # context propagation
    - noctx           # http requests without context
    - exhaustive      # exhaustive switch statements
    - wrapcheck       # error wrapping

linters-settings:
  revive:
    rules:
      - name: exported
        arguments:
          - checkPrivateReceivers: true
  exhaustive:
    default-signifies-exhaustive: true
  godot:
    scope: declarations

issues:
  exclude-rules:
    - path: "_test.go"
      linters:
        - errcheck
        - wrapcheck
  max-issues-per-linter: 50
  max-same-issues: 10
