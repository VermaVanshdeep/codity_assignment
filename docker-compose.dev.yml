# =============================================================================
# Docker Compose Override — Development Mode
# Use: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# In dev mode:
#   - API and Worker run with live code via air (hot reload)
#   - Frontend runs Next.js dev server
#   - No Nginx (direct port access)
# =============================================================================

version: "3.9"

services:

  api:
    build:
      target: dev
    volumes:
      - ./backend:/app
      - go_pkg_cache:/go/pkg
    command: air -c .air.toml
    environment:
      LOG_FORMAT: pretty

  worker:
    build:
      target: dev
    volumes:
      - ./backend:/app
      - go_pkg_cache:/go/pkg
    command: air -c .air.worker.toml
    environment:
      LOG_FORMAT: pretty

  frontend:
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules

  nginx:
    profiles:
      - disabled   # nginx not needed in dev

volumes:
  go_pkg_cache:
