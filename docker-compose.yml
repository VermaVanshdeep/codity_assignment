# =============================================================================
# Docker Compose — Production-like local environment
# Runs: PostgreSQL, Redis, API, Worker, Frontend (Next.js), Nginx
# =============================================================================



services:

  # ─── Infrastructure ─────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: scheduler_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-scheduler}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scheduler_secret}
      POSTGRES_DB:       ${POSTGRES_DB:-job_scheduler}
    ports:
      - "${HOST_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scheduler} -d ${POSTGRES_DB:-job_scheduler}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - scheduler_net

  redis:
    image: redis:7-alpine
    container_name: scheduler_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "${HOST_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - scheduler_net

  # ─── Backend ────────────────────────────────────────────────────────────────

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: api
    container_name: scheduler_api
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST:    redis
    ports:
      - "${HOST_APP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    working_dir: /app
    volumes:
      - ./backend/migrations:/app/migrations:ro
    networks:
      - scheduler_net

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: worker
    container_name: scheduler_worker
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST:    redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    deploy:
      replicas: 1          # scale with: docker-compose up --scale worker=N
    networks:
      - scheduler_net

  # ─── Frontend ───────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: scheduler_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${APP_BASE_URL:-http://localhost:8080}
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - scheduler_net

  # ─── Reverse Proxy ───────────────────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    container_name: scheduler_nginx
    restart: unless-stopped
    ports:
      - "${HOST_NGINX_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend
    networks:
      - scheduler_net

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  scheduler_net:
    driver: bridge
